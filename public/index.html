<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Simple Calculator</title>
    <style>
      body { font-family: Arial, sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; background:#f3f3f3 }
      #root { width:360px }
      .display { background:#222; color:#0f0; padding:16px; font-size:20px; text-align:right; border-radius:6px; min-height:48px }
      .buttons { display:grid; grid-template-columns: repeat(4,1fr); gap:8px; margin-top:12px }
      button { padding:16px; font-size:18px; border:0; border-radius:6px; cursor:pointer }
      button.fn { background:#ddd }
      button.op { background:#f5a623; color:white }
      button.equal { background:#4caf50; color:white; grid-column: span 2 }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="app.js"></script>
  </body>
  </html>
